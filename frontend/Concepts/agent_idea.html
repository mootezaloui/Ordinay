  <style>
    body {
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }
    
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes expand-width {
      from { width: 0%; }
      to { width: 100%; }
    }
    
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    
    .animate-slide-up {
      animation: slide-up 0.4s ease-out forwards;
    }
    
    .animate-pulse-dot {
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    
    .skeleton-shimmer {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    .progress-bar {
      animation: expand-width 2s ease-out forwards;
    }
    
    .typing-effect {
      overflow: hidden;
      white-space: nowrap;
      animation: typewriter 2s steps(40) forwards;
    }
    
    .artifact-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .artifact-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.15);
    }
    
    .chat-bubble {
      position: relative;
    }
    
    .chat-bubble::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 16px;
      width: 16px;
      height: 16px;
      background: inherit;
      transform: rotate(45deg);
      border-radius: 3px;
    }
    
    .scenario-btn {
      transition: all 0.2s ease;
    }
    
    .scenario-btn:hover {
      transform: scale(1.02);
    }
    
    .scenario-btn.active {
      transform: scale(0.98);
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

    function showScenario(scenarioKey) {
      currentScenario = scenarioKey;
      const scenario = scenarios[scenarioKey];
      
      // Update button states
      document.querySelectorAll('.scenario-btn').forEach(btn => {
        btn.classList.remove('border-indigo-200', 'bg-indigo-50');
        btn.classList.add('border-transparent');
      });
      const activeBtn = document.getElementById('btn-' + scenarioKey);
      activeBtn.classList.remove('border-transparent');
      activeBtn.classList.add('border-indigo-200', 'bg-indigo-50');
      
      const chatContainer = document.getElementById('chat-container');
      const assistantName = config.assistant_name || defaultConfig.assistant_name;
      
      chatContainer.innerHTML = `
        <!-- User message -->
        <div class="flex justify-end animate-slide-up">
          <div class="max-w-2xl">
            <div class="px-4 py-3 rounded-2xl rounded-tr-md bg-indigo-500 text-white">

            <p class="text-xs text-slate-400 mt-1 text-right">Just now</p>
          </div>
        </div>
        
        <!-- Assistant response -->
        <div class="flex gap-3 animate-slide-up" style="animation-delay: 0.2s">

    async function onConfigChange(newConfig) {
      config = { ...config, ...newConfig };
      
      // Update assistant name
      const titleEl = document.getElementById('assistant-title');
      if (titleEl) {
        titleEl.textContent = config.assistant_name || defaultConfig.assistant_name;
      }
      
      // Update chat input placeholder
      const inputEl = document.getElementById('chat-input');
      if (inputEl) {
        inputEl.placeholder = `Ask ${config.assistant_name || defaultConfig.assistant_name} anything about your cases...`;
      }
      
      // Re-render current scenario to update assistant name in chat
      showScenario(currentScenario);
    }

      return {
        recolorables: [],
        borderables: [],

      };

    function mapToEditPanelValues(cfg) {

      });
