events {
    worker_connections 256;
}

http {
    # Horizontal scaling: when running multiple proxy instances via
    # docker-compose --scale proxy=N, Docker DNS resolves "proxy" to
    # multiple IPs. least_conn distributes across them.
    upstream proxy_backend {
        least_conn;
        server proxy:3000;
    }

    # Rate limiting zone (backup — main rate limiting is in the app)
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;

    server {
        listen 80;
        server_name api.ordinay.app;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.ordinay.app;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Strip client IP from forwarded headers (privacy)
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";

        # Health check — no auth, no rate limit
        location /health {
            proxy_pass http://proxy_backend;
            proxy_set_header Host $host;
        }

        # API routes
        location / {
            limit_req zone=global burst=10 nodelay;
            proxy_pass http://proxy_backend;
            proxy_set_header Host $host;

            # SSE streaming support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }
    }
}
